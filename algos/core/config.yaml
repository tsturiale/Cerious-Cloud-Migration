# F Systematica Configuration
# Set live_mode: true ONLY after passing all paper deployment gates

# ─── Mode ─────────────────────────────────────────────────────────────────────
mode:
  live_mode: false           # true = Polymarket CLOB; false = paper simulation
  backtest_mode: false       # true = run against local CSV data
  log_level: INFO

market_data:
  source: polymarket_backend      # polymarket_backend | binance
  backend_base_url: http://127.0.0.1:8000
  polymarket_timeframe: 5min
  polymarket_poll_seconds: 8

# ─── Symbols ──────────────────────────────────────────────────────────────────
symbols:
  - BTC
  - ETH
  - SOL
  - XRP

# ─── Capital ──────────────────────────────────────────────────────────────────
capital:
  initial_bankroll: 10000.0
  max_exposure_per_15m_window: 0.10     # 10% of capital per 15-min window
  max_exposure_per_5m_market: 0.05      # 5% per individual 5-min market
  daily_loss_limit_pct: 0.15            # 15% daily loss triggers kill-switch

# ─── ATR Engine ───────────────────────────────────────────────────────────────
atr:
  period: 14                            # Wilder ATR(14)
  min_bars_required: 30                 # Warm-up bars before signals fire
  # 5-minute ATR / 15-minute ATR regime thresholds
  ratio_extreme_low: 0.30
  ratio_mod_low: 0.60
  ratio_balanced_high: 1.00
  ratio_mod_high: 1.50
  # ATR regime size modifiers
  size_modifier:
    extreme_compression: 1.5
    moderate_compression: 1.2
    balanced: 1.0
    moderate_expansion: 0.8
    extreme_expansion: 0.5

# ─── Strategy Alpha — ATR Momentum ────────────────────────────────────────────
alpha:
  enabled: true
  allocation: 0.35
  atr_expansion_trigger: 1.3            # 5m ATR > 1.3× 15m ATR
  momentum_bars_required: 3             # 3 of last 5 bars same direction
  fractional_kelly: 0.25               # 0.1–0.25 × full Kelly
  stoch_rsi_period: 14
  stoch_period: 14
  stoch_smooth_k: 3
  stoch_strong_bull: 60                 # %K > this = strong bull
  stoch_strong_bear: 40                 # %K < this = strong bear
  cooldown_bars: 2                      # bars to skip after trade

# ─── Strategy Beta — Mean Reversion ──────────────────────────────────────────
beta:
  enabled: true
  allocation: 0.35
  vwap_deviation_entry: 2.0            # |price - VWAP| > 2.0× ATR_5m
  vwap_deviation_high_conf: 2.5        # high confidence level
  wick_ratio_min: 2.0                  # wick-to-body >= 2:1 required
  atr_spike_abort_pct: 0.50            # 50% ATR increase in 1 bar = abort
  reversion_speed_lambda: 0.15         # for half-life T = ln(2)/λ × √D
  # Layered order allocation
  layer_primary_pct: 0.50
  layer_secondary_pct: 0.30
  layer_tertiary_pct: 0.20
  layer_primary_offset: 0.90           # 0.9× predicted ATR touch
  layer_secondary_offset: 1.00
  layer_tertiary_offset: 1.10
  regime_loss_limit_multiplier: 2.0    # suspend if cumulative loss > 2× avg win
  regime_suspend_cycles: 5             # suspend for 5× 15-min cycles

# ─── Strategy Gamma — Cross-TF Arbitrage ─────────────────────────────────────
gamma:
  enabled: true
  allocation: 0.30
  ratio_extreme_low: 0.25              # ATR ratio < 0.25 = long 5m vol
  ratio_extreme_high: 1.00             # ATR ratio > 1.0  = short 5m vol
  min_correlation: 0.40                # |ρ̂| minimum to enter
  max_correlation_std_err: 0.15        # max std error
  beta_hedge_ratio: 0.70               # default hedge ratio (5m/15m)
  rebalance_threshold_minor: 0.15      # ratio drift → 25% size cut
  rebalance_threshold_major: 0.25      # ratio drift → 50% size cut or close
  max_drawdown_per_position: 0.02      # 2% per position
  max_strategy_drawdown: 0.05          # 5% strategy-level cumulative
  cooldown_hours: 24                   # suspension after hitting limit
  time_stop_cycles: 3                  # 3× 5-min cycles max hold

# ─── Strategy Theta Sniper — Late-Stage Volatility ───────────────────────────
theta_sniper:
  enabled: true
  allocation: 0.20
  trigger_cent_value: 0.60             # Trigger at exactly $0.60 limit price
  timing_gate:
    scan_start_seconds: 480
    scan_end_seconds: 840
  iceberg_layers: 5

# ─── Execution ────────────────────────────────────────────────────────────────
execution:
  cycle_seconds: 2                     # 2-second main loop
  order_rate_limit_per_min: 55         # conservative (API max: 60)
  api_timeout_ms: 1500
  backoff_initial_ms: 500
  backoff_max_ms: 4000
  max_residual_duration_seconds: 5     # Gamma: unhedged leg → close

# ─── HMM Regime Engine ────────────────────────────────────────────────────────
hmm:
  n_regimes: 6
  lookback: 300
  resample_tf: 15min                   # resample 1m → 15m for HMM

# ─── Reporting ────────────────────────────────────────────────────────────────
reporting:
  output_dir: reports
  report_interval_hours: 24
  google_sheets_enabled: true
  google_sheet_name: ASYM_Edge_Execution
  credentials_path: "C:\\Users\\trade\\OneDrive\\Desktop\\Crypto Data\\Credential.json.json"
